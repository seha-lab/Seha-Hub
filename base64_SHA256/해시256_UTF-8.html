<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Seha-Hub-SHA256 UTF-8 Calculator</title>
    <link rel="icon" href="../imgs/icon.ico" />
    <meta name="robots" content="noindex, nofollow" />
    <link href="../style.css" rel="stylesheet" />
    <style>
      body {
        font-family:
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          "Noto Sans KR",
          Arial;
        padding: 18px;
        max-width: 800px;
        margin: auto;
      }
      textarea {
        width: 100%;
        height: 120px;
        padding: 8px;
        font-size: 14px;
        box-sizing: border-box;
      }
      .row {
        display: flex;
        gap: 8px;
        margin-top: 8px;
        flex-wrap: wrap;
      }
      button {
        padding: 8px 12px;
        border-radius: 8px;
        border: 1px solid #ccc;
        background: #f7f7f7;
        cursor: pointer;
      }
      .out {
        margin-top: 12px;
        background: #fafafa;
        padding: 10px;
        border: 1px solid #eee;
        border-radius: 8px;
      }
      pre {
        white-space: pre-wrap;
        word-break: break-all;
        margin: 6px 0;
      }
      label {
        font-weight: 600;
        font-size: 13px;
      }
      .small {
        font-size: 13px;
        color: #666;
      }
      input[type="file"] {
        display: inline-block;
      }
    </style>
  </head>
  <body>
    <h2>SHA-256 (UTF-8) 계산기 — HTML/JS</h2>
    <label for="txt">문자열 입력</label>
    <textarea
      id="txt"
      placeholder="여기에 해시할 문자열을 입력하세요 (UTF-8로 인코딩됩니다)"
    ></textarea>

    <div class="row">
      <button id="btnHash">해시 계산</button>
      <button id="btnClear">지우기</button>
      <label class="small">또는 파일 업로드:</label>
      <input id="file" type="file" />
    </div>

    <div class="out" id="result" aria-live="polite" style="display: none">
      <div><label>HEX</label> <button data-copy="hex">복사</button></div>
      <pre id="hex"></pre>

      <div><label>Base64</label> <button data-copy="b64">복사</button></div>
      <pre id="b64"></pre>

      <div>
        <label>Bytes (Uint8Array)</label>
        <button data-copy="bytes">복사</button>
      </div>
      <pre id="bytes"></pre>
    </div>

    <script>
      /* 헬퍼: ArrayBuffer -> hex 문자열 */
      function bufferToHex(buffer) {
        const bytes = new Uint8Array(buffer);
        let s = "";
        for (let i = 0; i < bytes.length; i++) {
          s += bytes[i].toString(16).padStart(2, "0");
        }
        return s;
      }

      /* 헬퍼: ArrayBuffer -> base64 문자열 */
      function bufferToBase64(buffer) {
        const bytes = new Uint8Array(buffer);
        // 빠른 base64 변환: chunk -> String.fromCharCode -> btoa
        let binary = "";
        const chunk = 0x8000;
        for (let i = 0; i < bytes.length; i += chunk) {
          binary += String.fromCharCode.apply(
            null,
            bytes.subarray(i, i + chunk),
          );
        }
        return btoa(binary);
      }

      /* 문자열을 UTF-8로 인코딩 후 SHA-256 계산 */
      async function sha256Utf8FromString(text) {
        const enc = new TextEncoder(); // UTF-8 인코더
        const data = enc.encode(text);
        const digest = await crypto.subtle.digest("SHA-256", data);
        return digest; // ArrayBuffer
      }

      /* 파일의 SHA-256 계산 (File API + ArrayBuffer) */
      function sha256Utf8FromFile(file) {
        return new Promise((resolve, reject) => {
          const r = new FileReader();
          r.onload = async (e) => {
            try {
              // 파일은 바이트 그대로 해시 (텍스트 파일이라면 내부 인코딩 신경써야 함)
              const ab = e.target.result;
              const digest = await crypto.subtle.digest("SHA-256", ab);
              resolve(digest);
            } catch (err) {
              reject(err);
            }
          };
          r.onerror = () => reject(r.error);
          r.readAsArrayBuffer(file);
        });
      }

      /* UI 연결 */
      const btnHash = document.getElementById("btnHash");
      const btnClear = document.getElementById("btnClear");
      const txt = document.getElementById("txt");
      const fileInput = document.getElementById("file");
      const out = document.getElementById("result");
      const hexEl = document.getElementById("hex");
      const b64El = document.getElementById("b64");
      const bytesEl = document.getElementById("bytes");

      async function showDigestFromBuffer(buffer) {
        const hex = bufferToHex(buffer);
        const b64 = bufferToBase64(buffer);
        const bytes = Array.from(new Uint8Array(buffer)).join(", ");
        hexEl.textContent = hex;
        b64El.textContent = b64;
        bytesEl.textContent = "[" + bytes + "]";
        out.style.display = "block";
      }

      btnHash.addEventListener("click", async () => {
        try {
          const s = txt.value;
          const digest = await sha256Utf8FromString(s);
          await showDigestFromBuffer(digest);
        } catch (err) {
          alert("해시 실패: " + err);
        }
      });

      btnClear.addEventListener("click", () => {
        txt.value = "";
        out.style.display = "none";
        hexEl.textContent = b64El.textContent = bytesEl.textContent = "";
        fileInput.value = "";
      });

      /* 파일 업로드로 해시 계산 */
      fileInput.addEventListener("change", async (ev) => {
        const f = ev.target.files && ev.target.files[0];
        if (!f) return;
        try {
          const digest = await sha256Utf8FromFile(f);
          await showDigestFromBuffer(digest);
        } catch (err) {
          alert("파일 해시 실패: " + err);
        }
      });

      /* 복사 버튼들 (HEX / base64 / bytes) */
      document.addEventListener("click", (e) => {
        const t = e.target;
        if (!t.matches("button[data-copy]")) return;
        const what = t.getAttribute("data-copy");
        let text = "";
        if (what === "hex") text = hexEl.textContent;
        else if (what === "b64") text = b64El.textContent;
        else if (what === "bytes") text = bytesEl.textContent;
        if (!text) {
          alert("복사할 내용이 없습니다. 먼저 해시를 계산하세요.");
          return;
        }
        navigator.clipboard?.writeText(text).then(
          () => {
            t.textContent = "복사됨";
            setTimeout(() => (t.textContent = "복사"), 1200);
          },
          () => {
            // 실패 시 대체 (execCommand)
            const ta = document.createElement("textarea");
            ta.value = text;
            document.body.appendChild(ta);
            ta.select();
            try {
              document.execCommand("copy");
              alert("복사 완료");
            } catch (e) {
              alert("복사 실패");
            }
            ta.remove();
          },
        );
      });
    </script>
  </body>
  <footer>
    <div class="wrap">© 2026 Seha Hub</div>
  </footer>
</html>
